<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>duanju 极简面板</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131b33;
      --panel-2: #182342;
      --line: #2a396b;
      --text: #eef3ff;
      --muted: #99a7d1;
      --ok: #2bd576;
      --warn: #ffcc66;
      --bad: #ff6b6b;
      --btn: #5473ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      background: linear-gradient(180deg, #090d1a 0%, #10172d 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }
    .hero h1 { margin: 0; font-size: 30px; }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
    }
    .panel {
      background: rgba(19,27,51,0.9);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,.28);
    }
    .panel h2 { margin: 0 0 14px; font-size: 18px; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { color: var(--muted); font-size: 13px; }
    input, select, textarea {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #88a0ff; }
    .btns { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      color: white;
      background: var(--btn);
      font-weight: 600;
    }
    button.secondary { background: #314168; }
    button.ghost { background: transparent; border: 1px solid var(--line); }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      white-space: pre-wrap;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
    }
    .status.ok { border-color: rgba(43,213,118,.4); }
    .status.bad { border-color: rgba(255,107,107,.4); }
    .recent-group { display: grid; gap: 12px; }
    .cards { display: grid; gap: 10px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.03);
    }
    .card-title { font-weight: 700; margin-bottom: 8px; }
    .small { font-size: 12px; color: var(--muted); }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      word-break: break-all;
    }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }
    .viewer {
      margin-top: 18px;
      min-height: 280px;
    }
    .viewer pre {
      white-space: pre-wrap;
      background: #0b1326;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin: 0;
      max-height: 460px;
      overflow: auto;
    }
    @media (max-width: 960px) {
      .grid, .split, .form-grid { grid-template-columns: 1fr; }
    }
    
    /* 蒸馏规则样式 */
    .distill-section {
      margin-top: 24px;
    }
    .distill-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .distill-tab {
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      cursor: pointer;
    }
    .distill-tab.active {
      background: var(--btn);
      color: white;
      border-color: var(--btn);
    }
    .distill-content {
      max-height: 600px;
      overflow-y: auto;
    }
    .hook-card {
      background: rgba(43,213,118,.1);
      border: 1px solid rgba(43,213,118,.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .hook-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--ok);
    }
    .hook-card p {
      margin: 0;
      line-height: 1.6;
    }
    .skeleton-card {
      background: rgba(84,115,255,.1);
      border: 1px solid rgba(84,115,255,.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .skeleton-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--btn);
    }
    .skeleton-card .pattern {
      font-style: italic;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .skeleton-card .examples {
      background: rgba(0,0,0,.2);
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
      font-size: 13px;
    }
    .golden-triangle {
      background: linear-gradient(135deg, rgba(255,204,102,.15), rgba(43,213,118,.15));
      border: 1px solid rgba(255,204,102,.4);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .golden-triangle h3 {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--warn);
    }
    .triangle-parts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    .triangle-part {
      background: rgba(0,0,0,.2);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .triangle-part .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .triangle-part .value {
      font-size: 14px;
      font-weight: 600;
    }
    .constraints {
      background: rgba(255,107,107,.1);
      border: 1px solid rgba(255,107,107,.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }
    .constraints h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--bad);
    }
    .constraints ul {
      margin: 0;
      padding-left: 20px;
    }
    .constraints li {
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>duanju 本地极简 Web 面板</h1>
        <div class="muted">填参数 → 生成 manifest / 一键跑 fast_validation → 看最近输出</div>
      </div>
      <button class="secondary" id="refreshBtn">刷新</button>
      <button id="distillBtn">查看蒸馏规则</button>
    </div>

    <div class="grid">
      <section class="panel">
        <h2>操作区</h2>
        <div class="form-grid">
          <div class="field">
            <label>任务名</label>
            <input id="taskName" placeholder="quick_local" />
          </div>
          <div class="field">
            <label>preset</label>
            <select id="preset"></select>
          </div>
          <div class="field full">
            <label>视频文件</label>
            <select id="videoPath"></select>
          </div>
          <div class="field full">
            <label>字幕文件（可空）</label>
            <select id="subtitlePath">
              <option value="">不带字幕</option>
            </select>
          </div>
          <div class="field">
            <label>channel</label>
            <select id="channel"></select>
          </div>
          <div class="field">
            <label>region</label>
            <select id="region"></select>
          </div>
        </div>

        <div class="btns">
          <button id="manifestBtn">生成 manifest</button>
          <button id="runBtn">一键跑 pipeline</button>
          <button class="ghost" id="fillNewestBtn">填入最新视频</button>
        </div>

        <div id="status" class="status">等待操作</div>
      </section>

      <section class="panel">
        <h2>最近输出</h2>
        <div class="recent-group">
          <div>
            <div class="card-title">manifests</div>
            <div id="manifests" class="cards"></div>
          </div>
          <div>
            <div class="card-title">titles</div>
            <div id="titles" class="cards"></div>
          </div>
          <div>
            <div class="card-title">covers</div>
            <div id="covers" class="cards"></div>
          </div>
        </div>
      </section>
    </div>

    <!-- 蒸馏规则展示区 -->
    <div class="distill-section" id="distillSection" style="display: none;">
      <section class="panel">
        <h2>蒸馏规则 - 印尼市场</h2>
        <div class="distill-tabs">
          <button class="distill-tab active" data-tab="why">Why (原则)</button>
          <button class="distill-tab" data-tab="what">What (示例)</button>
          <button class="distill-tab" data-tab="how">How (规则)</button>
        </div>
        <div id="distillContent" class="distill-content"></div>
      </section>
    </div>

    <div class="split viewer">
      <section class="panel">
        <h2>运行日志</h2>
        <pre id="logs">这里会显示命令输出</pre>
      </section>
      <section class="panel">
        <h2>文件预览</h2>
        <pre id="filePreview">点击右侧卡片里的"查看文件"</pre>
      </section>
    </div>
  </div>

  <script>
    const els = {
      taskName: document.getElementById('taskName'),
      preset: document.getElementById('preset'),
      videoPath: document.getElementById('videoPath'),
      subtitlePath: document.getElementById('subtitlePath'),
      channel: document.getElementById('channel'),
      region: document.getElementById('region'),
      manifests: document.getElementById('manifests'),
      titles: document.getElementById('titles'),
      covers: document.getElementById('covers'),
      status: document.getElementById('status'),
      logs: document.getElementById('logs'),
      filePreview: document.getElementById('filePreview'),
      refreshBtn: document.getElementById('refreshBtn'),
      manifestBtn: document.getElementById('manifestBtn'),
      runBtn: document.getElementById('runBtn'),
      fillNewestBtn: document.getElementById('fillNewestBtn'),
      distillBtn: document.getElementById('distillBtn'),
      distillSection: document.getElementById('distillSection'),
      distillContent: document.getElementById('distillContent')
    };

    let distillData = null;
    let currentTab = 'why';

    function setStatus(text, ok = true) {
      els.status.textContent = text;
      els.status.className = 'status ' + (ok ? 'ok' : 'bad');
    }

    function optionize(select, values, emptyLabel = '') {
      const current = select.value;
      select.innerHTML = '';
      if (emptyLabel) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = emptyLabel;
        select.appendChild(opt);
      }
      values.forEach(value => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        select.appendChild(opt);
      });
      if ([...select.options].some(o => o.value === current)) select.value = current;
    }

    function guessTaskName(path) {
      if (!path) return 'quick_local';
      return path.split('/').pop().replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9_-]+/g, '_') || 'quick_local';
    }

    function renderCards(container, items) {
      container.textContent = '';
      if (!items || !items.length) {
        const empty = document.createElement('div');
        empty.className = 'small';
        empty.textContent = '暂无';
        container.appendChild(empty);
        return;
      }

      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        const path = document.createElement('div');
        path.className = 'mono';
        path.textContent = item.path || '';
        card.appendChild(path);

        const time = document.createElement('div');
        time.className = 'small';
        time.textContent = item.mtime || '';
        card.appendChild(time);

        const preview = item.preview || {};
        Object.entries(preview)
          .filter(([, v]) => String(v || '').trim())
          .slice(0, 4)
          .forEach(([k, v]) => {
            const line = document.createElement('div');
            line.className = 'small';
            line.textContent = `${k}: ${String(v)}`;
            card.appendChild(line);
          });

        const btnWrap = document.createElement('div');
        btnWrap.className = 'btns';
        btnWrap.style.marginTop = '10px';
        const btn = document.createElement('button');
        btn.className = 'secondary';
        btn.textContent = '查看文件';
        btn.onclick = () => loadFile(item.path || '');
        btnWrap.appendChild(btn);
        card.appendChild(btnWrap);

        container.appendChild(card);
      });
    }

    async function loadFile(path) {
      const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
      const data = await res.json();
      els.filePreview.textContent = data.ok ? data.content : (data.error || '读取失败');
    }

    async function loadStatus() {
      const res = await fetch('/api/status');
      const payload = await res.json();
      const data = payload.data;
      optionize(els.preset, data.presets || []);
      optionize(els.channel, data.channels || []);
      optionize(els.region, data.regions || []);
      optionize(els.videoPath, (data.raw_files || []).filter(p => /\.(mp4|mov|mkv|avi)$/i.test(p)));
      optionize(els.subtitlePath, (data.raw_files || []).filter(p => /\.srt$/i.test(p)), '不带字幕');
      if (!els.taskName.value) els.taskName.value = guessTaskName(els.videoPath.value);
      renderCards(els.manifests, data.recent.manifests || []);
      renderCards(els.titles, data.recent.titles || []);
      renderCards(els.covers, data.recent.covers || []);
      setStatus('面板已加载');
    }

    function payloadFromForm() {
      return {
        task_name: els.taskName.value.trim() || guessTaskName(els.videoPath.value),
        preset: els.preset.value,
        target_channel: els.channel.value,
        target_region: els.region.value,
        video_path: els.videoPath.value,
        subtitle_path: els.subtitlePath.value
      };
    }

    async function run(endpoint) {
      const payload = payloadFromForm();
      setStatus('执行中...');
      els.logs.textContent = '执行中...';
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      const result = data.result || {};
      els.logs.textContent = [result.command, '', result.stdout || '', result.stderr || ''].join('\n');
      setStatus(data.ok ? `完成：${data.panel}` : `失败：${data.error || result.stderr || 'unknown error'}`, !!data.ok);
      await loadStatus();
    }

    async function loadDistillData() {
      if (distillData) return distillData;
      
      try {
        const res = await fetch('/api/distill-detail?lang=印尼');
        if (res.ok) {
          distillData = await res.json();
          // 提取v5_content作为主要数据
          if (distillData.v5_content) {
            distillData = distillData.v5_content;
          }
          return distillData;
        }
      } catch (e) {
        console.log('API error:', e);
      }
      
      return null;
    }

    function renderWhy(data) {
      if (!data || !data.why) return '<p>无数据</p>';
      
      let html = '';
      
      // 标题原则
      if (data.why.title) {
        html += '<h3 style="margin-top: 0;">标题原则</h3>';
        data.why.title.forEach((item, i) => {
          html += `
            <div class="hook-card">
              <h3>${i + 1}. ${item.principle}</h3>
              <p><strong>心理机制：</strong>${item.psychology}</p>
              <p><strong>应用：</strong>${item.application}</p>
            </div>
          `;
        });
      }
      
      // 封面原则
      if (data.why.thumbnail) {
        html += '<h3>封面原则</h3>';
        data.why.thumbnail.forEach((item, i) => {
          html += `
            <div class="hook-card">
              <h3>${i + 1}. ${item.principle}</h3>
              <p><strong>心理机制：</strong>${item.psychology}</p>
              <p><strong>应用：</strong>${item.application}</p>
            </div>
          `;
        });
      }
      
      return html;
    }

    function renderWhat(data) {
      if (!data || !data.what) return '<p>无数据</p>';
      
      let html = '<h3 style="margin-top: 0;">剧情模板</h3>';
      data.what.forEach((item, i) => {
        html += `
          <div class="skeleton-card">
            <h3>${i + 1}. ${item.name}</h3>
            <div class="pattern">${item.template}</div>
            <p><strong>为什么有效：</strong>${item.why_it_works}</p>
            <p><strong>类型：</strong>${item.sub_genre}</p>
            <div class="examples">
              <strong>示例：</strong><br>
              ${item.examples.map(ex => `• ${ex}`).join('<br>')}
            </div>
          </div>
        `;
      });
      
      return html;
    }

    function renderHow(data) {
      if (!data || !data.how) return '<p>无数据</p>';
      
      let html = '';
      
      // 黄金三角
      if (data.how.hook_combination) {
        const hook = data.how.hook_combination;
        html += `
          <div class="golden-triangle">
            <h3>🎯 黄金三角公式</h3>
            <p>${hook.golden_triangle}</p>
            <div class="triangle-parts">
              <div class="triangle-part">
                <div class="label">情绪钩子</div>
                <div class="value">屈辱、愤怒、绝望、甜蜜</div>
              </div>
              <div class="triangle-part">
                <div class="label">身份钩子</div>
                <div class="value">乞丐、保姆、残疾总裁、战神</div>
              </div>
              <div class="triangle-part">
                <div class="label">反转钩子</div>
                <div class="value">实则是、没想到、直到他…</div>
              </div>
            </div>
          </div>
        `;
        
        // 最强配对
        if (hook.strongest_pairs) {
          html += '<h3>最强配对</h3><ul>';
          hook.strongest_pairs.forEach(pair => {
            html += `<li>${pair}</li>`;
          });
          html += '</ul>';
        }
        
        // 禁止组合
        if (hook.forbidden_combinations) {
          html += `
            <div class="constraints">
              <h3>禁止组合</h3>
              <ul>
                ${hook.forbidden_combinations.map(c => `<li>${c}</li>`).join('')}
              </ul>
            </div>
          `;
        }
      }
      
      // 标题骨架
      if (data.how.title_skeletons) {
        html += '<h3>标题骨架</h3>';
        data.how.title_skeletons.forEach((item, i) => {
          html += `
            <div class="skeleton-card">
              <h3>${i + 1}. ${item.name}</h3>
              <div class="pattern">${item.narrative_pattern}</div>
              <p><strong>心理钩子：</strong>${item.psychological_hook}</p>
              <div class="examples">
                <strong>示例：</strong><br>
                ${item.examples.map(ex => `• ${ex}`).join('<br>')}
              </div>
              <p><strong>规则：</strong></p>
              <ul>
                ${item.rules.map(r => `<li>${r}</li>`).join('')}
              </ul>
            </div>
          `;
        });
      }
      
      // 标题约束
      if (data.how.title_constraints) {
        const tc = data.how.title_constraints;
        html += `
          <div class="constraints">
            <h3>标题约束</h3>
            <ul>
              <li>平均长度：${tc.avg_length} 字符</li>
              <li>emoji使用率：${tc.emoji_rate}%</li>
              <li>常用emoji：${tc.top_emojis ? tc.top_emojis.join(' ') : '无'}</li>
              <li>前半部分：${tc.front_half}</li>
              <li>后半部分：${tc.back_half}</li>
            </ul>
          </div>
        `;
      }
      
      return html;
    }

    function renderDistill(tab) {
      if (!distillData) {
        els.distillContent.innerHTML = '<p>加载中...</p>';
        return;
      }
      
      let html = '';
      switch (tab) {
        case 'why':
          html = renderWhy(distillData);
          break;
        case 'what':
          html = renderWhat(distillData);
          break;
        case 'how':
          html = renderHow(distillData);
          break;
      }
      
      els.distillContent.innerHTML = html;
    }

    // 切换蒸馏规则显示
    els.distillBtn.onclick = async () => {
      const isVisible = els.distillSection.style.display !== 'none';
      els.distillSection.style.display = isVisible ? 'none' : 'block';
      els.distillBtn.textContent = isVisible ? '查看蒸馏规则' : '隐藏蒸馏规则';
      
      if (!isVisible && !distillData) {
        els.distillContent.innerHTML = '<p>加载中...</p>';
        distillData = await loadDistillData();
        if (distillData) {
          renderDistill(currentTab);
        } else {
          els.distillContent.innerHTML = '<p style="color: var(--bad);">无法加载蒸馏规则数据</p>';
        }
      }
    };

    // 切换标签
    document.querySelectorAll('.distill-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.distill-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        renderDistill(currentTab);
      };
    });

    els.videoPath.onchange = () => {
      if (!els.taskName.value || els.taskName.value === 'quick_local') {
        els.taskName.value = guessTaskName(els.videoPath.value);
      }
    };
    els.fillNewestBtn.onclick = async () => {
      await loadStatus();
      if (els.videoPath.options.length > 0) {
        els.videoPath.selectedIndex = 0;
        els.taskName.value = guessTaskName(els.videoPath.value);
      }
    };
    els.refreshBtn.onclick = loadStatus;
    els.manifestBtn.onclick = () => run('/api/manifest');
    els.runBtn.onclick = () => run('/api/run');

    loadStatus();
  </script>
</body>
</html>
